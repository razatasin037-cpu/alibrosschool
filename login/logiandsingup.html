<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Signup</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              "page-fade": "pageFade 3s ease forwards",
              popup: "popup 0.9s ease forwards",
              "floating-slow": "floating 6s ease-in-out infinite",
              "floating-fast": "floating 7s ease-in-out infinite",
              "form-switch": "formSwitch 0.6s ease forwards",
            },
            keyframes: {
              pageFade: {
                "0%": { opacity: "0", transform: "scale(1.02)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              popup: {
                "0%": {
                  opacity: "0",
                  transform: "translateY(80px) scale(0.9)",
                },
                "60%": {
                  opacity: "1",
                  transform: "translateY(-10px) scale(1.02)",
                },
                "100%": { transform: "translateY(0) scale(1)" },
              },
              floating: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(25px)" },
              },
              formSwitch: {
                "0%": { opacity: "0", transform: "translateX(40px)" },
                "100%": { opacity: "1", transform: "translateX(0)" },
              },
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="min-h-screen flex justify-center align-center items-center bg-gradient-to-b from-[#020617] via-[#081225] to-[#020617] font-sans overflow-hidden relative isolate animate-page-fade"
  >
    <div
      class="absolute w-[350px] h-[350px] rounded-full bg-[#4d6fff]/18 top-[-120px] left-[-120px] blur-[120px] animate-floating-slow -z-10"
    ></div>
    <div
      class="absolute w-[320px] h-[320px] rounded-full bg-[#5aaa6f]/14 bottom-[-120px] right-[-120px] blur-[120px] animate-floating-fast -z-10"
    ></div>

    <a
      href="/aillearing.html"
      class="absolute top-[25px] left-[25px] inline-flex items-center gap-2.5 px-5 py-3 rounded-full bg-white/5 border border-white/10 text-white no-underline text-sm font-bold backdrop-blur-md transition-all duration-300 hover:-translate-y-1 hover:border-[#4d6fff] hover:shadow-[0_0_25px_rgba(77,111,255,0.25)] z-10"
    >
      <i class="fa-solid fa-arrow-left text-[#4d6fff]"></i>
      Back To Home
    </a>

    <div
      class="w-[95%] sm:w-[420px] bg-white/5 border border-white/10 rounded-[35px] p-6 sm:p-10 backdrop-blur-xl shadow-[0_0_40px_rgba(77,111,255,0.2)] relative overflow-hidden animate-popup"
    >
      <div class="flex bg-white/5 rounded-[18px] p-1.5 mb-[35px]">
        <button
          class="flex-1 border-none py-3.5 rounded-[14px] bg-none text-white text-lg font-bold transition-all duration-300 relative overflow-hidden before:content-[''] before:absolute before:w-0 before:h-full before:top-0 before:left-0 before:bg-gradient-to-br before:from-white/20 before:to-transparent before:transition-all before:duration-400 hover:before:w-full [&.active]:bg-gradient-to-br [&.active]:from-[#4d6fff] [&.active]:to-[#5d5fe6] [&.active]:shadow-[0_0_20px_rgba(77,111,255,0.3)] active"
          id="loginBtn"
        >
          Login
        </button>
        <button
          class="flex-1 border-none py-3.5 rounded-[14px] bg-none text-white text-lg font-bold transition-all duration-300 relative overflow-hidden before:content-[''] before:absolute before:w-0 before:h-full before:top-0 before:left-0 before:bg-gradient-to-br before:from-white/20 before:to-transparent before:transition-all before:duration-400 hover:before:w-full [&.active]:bg-gradient-to-br [&.active]:from-[#4d6fff] [&.active]:to-[#5d5fe6] [&.active]:shadow-[0_0_20px_rgba(77,111,255,0.3)]"
          id="signupBtn"
        >
          Sign Up
        </button>
      </div>

      <form
        class="hidden [&.active]:block animate-form-switch active"
        id="loginForm"
      >
        <h2 class="text-white text-[32px] sm:text-[42px] font-black mb-2.5">
          Welcome Back
        </h2>
        <p class="text-[#cbd5e1] mb-[30px]">Login to continue learning</p>

        <div class="mb-[22px]">
          <label class="text-white block mb-2.5 text-sm font-semibold">
            <i class="fa-solid fa-envelope text-[#4d6fff] mr-2"></i> Email
          </label>
          <input
            type="email"
            placeholder="Enter email"
            class="w-full px-4.5 py-4 border-none outline-none rounded-2xl bg-white/5 border border-white/10 text-white transition-all duration-300 hover:scale-[1.01] focus:border-[#4d6fff] focus:shadow-[0_0_20px_rgba(77,111,255,0.2)]"
          />
        </div>

        <div class="mb-[22px]">
          <label class="text-white block mb-2.5 text-sm font-semibold">
            <i class="fa-solid fa-lock text-[#4d6fff] mr-2"></i> Password
          </label>
          <input
            type="password"
            placeholder="Enter password"
            class="w-full px-4.5 py-4 border-none outline-none rounded-2xl bg-white/5 border border-white/10 text-white transition-all duration-300 hover:scale-[1.01] focus:border-[#4d6fff] focus:shadow-[0_0_20px_rgba(77,111,255,0.2)]"
          />
        </div>

        <button
          type="submit"
          class="w-full border-none py-4 rounded-[18px] bg-gradient-to-br from-[#2141d1] to-[#1d31c4] text-white text-lg font-bold mt-2.5 transition-all duration-300 relative overflow-hidden before:content-[''] before:absolute before:top-0 before:left-[-100%] before:w-full before:h-full before:bg-gradient-to-r before:from-transparent before:via-white/30 before:to-transparent before:transition-all before:duration-600 hover:before:left-[100%] hover:-translate-y-1 hover:shadow-[0_0_25px_rgba(77,111,255,0.35)]"
        >
          Login
        </button>
      </form>

      <form class="hidden [&.active]:block animate-form-switch" id="signupForm">
        <h2 class="text-white text-[32px] sm:text-[42px] font-black mb-2.5">
          Create Account
        </h2>
        <p class="text-[#cbd5e1] mb-[30px]">Join Alibros Learning</p>

        <div class="mb-[22px]">
          <label class="text-white block mb-2.5 text-sm font-semibold">
            <i class="fa-solid fa-user text-[#4d6fff] mr-2"></i> Full Name
          </label>
          <input
            type="text"
            placeholder="Enter full name"
            class="w-full px-4.5 py-4 border-none outline-none rounded-2xl bg-white/5 border border-white/10 text-white transition-all duration-300 hover:scale-[1.01] focus:border-[#4d6fff] focus:shadow-[0_0_20px_rgba(77,111,255,0.2)]"
          />
        </div>

        <div class="mb-[22px]">
          <label class="text-white block mb-2.5 text-sm font-semibold">
            <i class="fa-solid fa-envelope text-[#4d6fff] mr-2"></i> Email
          </label>
          <input
            type="email"
            placeholder="Enter email"
            class="w-full px-4.5 py-4 border-none outline-none rounded-2xl bg-white/5 border border-white/10 text-white transition-all duration-300 hover:scale-[1.01] focus:border-[#4d6fff] focus:shadow-[0_0_20px_rgba(77,111,255,0.2)]"
          />
        </div>

        <div class="mb-[22px]">
          <label class="text-white block mb-2.5 text-sm font-semibold">
            <i class="fa-solid fa-lock text-[#4d6fff] mr-2"></i> Password
          </label>
          <input
            type="password"
            placeholder="Create password"
            class="w-full px-4.5 py-4 border-none outline-none rounded-2xl bg-white/5 border border-white/10 text-white transition-all duration-300 hover:scale-[1.01] focus:border-[#4d6fff] focus:shadow-[0_0_20px_rgba(77,111,255,0.2)]"
          />
        </div>

        <button
          type="submit"
          class="w-full border-none py-4 rounded-[18px] bg-gradient-to-br from-[#2141d1] to-[#1d31c4] text-white text-lg font-bold mt-2.5 transition-all duration-300 relative overflow-hidden before:content-[''] before:absolute before:top-0 before:left-[-100%] before:w-full before:h-full before:bg-gradient-to-r before:from-transparent before:via-white/30 before:to-transparent before:transition-all before:duration-600 hover:before:left-[100%] hover:-translate-y-1 hover:shadow-[0_0_25px_rgba(77,111,255,0.35)]"
        >
          Sign Up
        </button>
      </form>
    </div>

    <script>
      const loginBtn = document.getElementById("loginBtn");
      const signupBtn = document.getElementById("signupBtn");
      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");

      loginBtn.onclick = () => {
        loginBtn.classList.add("active");
        signupBtn.classList.remove("active");
        loginForm.classList.add("active");
        signupForm.classList.remove("active");
      };

      signupBtn.onclick = () => {
        signupBtn.classList.add("active");
        loginBtn.classList.remove("active");
        signupForm.classList.add("active");
        loginForm.classList.remove("active");
      };
    </script>
  </body>
</html>
