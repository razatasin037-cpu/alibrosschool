<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login / Signup</title>

    <!-- BOOTSTRAP -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        background: linear-gradient(to bottom, #020617, #081225, #020617);

        font-family: Arial;
      }
      /* BACK HOME BUTTON */

      .back-home-btn {
        position: absolute;

        top: 25px;
        left: 25px;

        display: inline-flex;

        align-items: center;

        gap: 10px;

        padding: 12px 22px;

        border-radius: 40px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: white;

        text-decoration: none;

        font-size: 15px;

        font-weight: 700;

        backdrop-filter: blur(14px);

        transition: 0.3s;

        z-index: 10;
      }

      /* ICON */

      .back-home-btn i {
        color: #4d6fff;
      }

      /* HOVER */

      .back-home-btn:hover {
        color: white;

        transform: translateY(-4px);

        border-color: #4d6fff;

        box-shadow: 0 0 25px rgba(77, 111, 255, 0.25);
      }

      /* CONTAINER */

      .auth-container {
        width: 420px;

        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 35px;

        padding: 40px;

        backdrop-filter: blur(16px);

        box-shadow: 0 0 40px rgba(77, 111, 255, 0.2);

        position: relative;

        overflow: hidden;
      }

      /* TOP BUTTONS */

      .auth-form {
        display: none;

        animation: smoothFade 0.5s ease;
      }

      .auth-form.active {
        display: block;
      }

      /* ANIMATION */

      @keyframes smoothFade {
        0% {
          opacity: 0;

          transform: translateY(25px) scale(0.96);
        }

        50% {
          opacity: 0.5;
        }

        100% {
          opacity: 1;

          transform: translateY(0) scale(1);
        }
      }

      /* BUTTON ACTIVE ANIMATION */

      .auth-switch {
        position: relative;

        overflow: hidden;
      }

      .auth-switch::before {
        content: "";

        position: absolute;

        width: 0;

        height: 100%;

        top: 0;
        left: 0;

        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.2),
          transparent
        );

        transition: 0.4s;
      }

      .auth-switch:hover::before {
        width: 100%;
      }

      /* ACTIVE BUTTON */

      .auth-switch.active {
        animation: pulseGlow 0.5s ease;
      }

      /* GLOW */

      @keyframes pulseGlow {
        0% {
          transform: scale(0.95);
        }

        50% {
          transform: scale(1.03);

          box-shadow: 0 0 25px rgba(77, 111, 255, 0.35);
        }

        100% {
          transform: scale(1);
        }
      }

      .auth-top {
        display: flex;

        background: rgba(255, 255, 255, 0.05);

        border-radius: 18px;

        padding: 6px;

        margin-bottom: 35px;
      }

      .auth-switch {
        flex: 1;

        border: none;

        padding: 14px;

        border-radius: 14px;

        background: none;

        color: white;

        font-size: 18px;

        font-weight: 700;

        transition: 0.3s;
      }

      /* ACTIVE */

      .auth-switch.active {
        background: linear-gradient(135deg, #4d6fff, #5d5fe6);

        box-shadow: 0 0 20px rgba(77, 111, 255, 0.3);
      }

      /* FORM */

      .auth-form {
        display: none;
      }

      .auth-form.active {
        display: block;
      }

      /* TITLE */

      .auth-form h2 {
        color: white;

        font-size: 42px;

        font-weight: 900;

        margin-bottom: 10px;
      }

      .auth-form p {
        color: #cbd5e1;

        margin-bottom: 30px;
      }

      /* full page animations */

      /* BODY */

      body {
        animation: pageFade 3s ease;
      }

      /* PAGE LOAD */

      @keyframes pageFade {
        0% {
          opacity: 0;

          transform: scale(1.02);
        }

        100% {
          opacity: 1;

          transform: scale(1);
        }
      }

      /* CONTAINER */

      .auth-container {
        animation: popup 0.9s ease;
      }

      /* POPUP */

      @keyframes popup {
        0% {
          opacity: 0;

          transform: translateY(80px) scale(0.9);
        }

        60% {
          opacity: 1;

          transform: translateY(-10px) scale(1.02);
        }

        100% {
          transform: translateY(0) scale(1);
        }
      }

      /* BLUR CIRCLE */

      body::before {
        content: "";

        position: absolute;

        width: 350px;
        height: 350px;

        border-radius: 50%;

        background: rgba(77, 111, 255, 0.18);

        top: -120px;
        left: -120px;

        filter: blur(120px);

        animation: floating 6s ease-in-out infinite;
      }

      body::after {
        content: "";

        position: absolute;

        width: 320px;
        height: 320px;

        border-radius: 50%;

        background: rgba(90, 170, 111, 0.14);

        bottom: -120px;
        right: -120px;

        filter: blur(120px);

        animation: floating 7s ease-in-out infinite;
      }

      /* FLOAT */

      @keyframes floating {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(25px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      /* INPUT HOVER */

      .input-box input:hover {
        transform: scale(1.01);
      }

      /* BUTTON */

      .auth-btn {
        position: relative;

        overflow: hidden;
      }

      /* BUTTON SHINE */

      .auth-btn::before {
        content: "";

        position: absolute;

        top: 0;
        left: -100%;

        width: 100%;
        height: 100%;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );

        transition: 0.6s;
      }

      .auth-btn:hover::before {
        left: 100%;
      }

      /* FORM SWITCH */

      .auth-form {
        display: none;

        animation: formSwitch 0.6s ease;
      }

      .auth-form.active {
        display: block;
      }

      /* FORM ANIMATION */

      @keyframes formSwitch {
        0% {
          opacity: 0;

          transform: translateX(40px);
        }

        100% {
          opacity: 1;

          transform: translateX(0);
        }
      }

      /* INPUT */

      .input-box {
        margin-bottom: 22px;
      }

      .input-box label {
        color: white;

        display: block;

        margin-bottom: 10px;

        font-size: 15px;

        font-weight: 600;
      }

      .input-box label i {
        color: #4d6fff;

        margin-right: 8px;
      }

      .input-box input {
        width: 100%;

        padding: 16px 18px;

        border: none;

        outline: none;

        border-radius: 16px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: white;

        transition: 0.3s;
      }

      .input-box input:focus {
        border-color: #4d6fff;

        box-shadow: 0 0 20px rgba(77, 111, 255, 0.2);
      }

      /* BUTTON */

      .auth-btn {
        width: 100%;

        border: none;

        padding: 16px;

        border-radius: 18px;

        background: linear-gradient(135deg, #2141d1, #1d31c4);

        color: white;

        font-size: 18px;

        font-weight: 700;

        margin-top: 10px;

        transition: 0.3s;
      }

      .auth-btn:hover {
        transform: translateY(-4px);

        box-shadow: 0 0 25px rgba(77, 111, 255, 0.35);
      }

      /* MOBILE */

      @media (max-width: 576px) {
        .auth-container {
          width: 95%;

          padding: 25px;
        }

        .auth-form h2 {
          font-size: 32px;
        }
      }
    </style>
  </head>

  <body>
    <!-- BACK TO HOME -->

    <a href="http://127.0.0.1:5501/aillearing.html" class="back-home-btn">
      <i class="fa-solid fa-arrow-left"></i>

      Back To Home
    </a>

    <div class="auth-container">
      <!-- TOP BUTTON -->

      <div class="auth-top">
        <button class="auth-switch active" id="loginBtn">Login</button>

        <button class="auth-switch" id="signupBtn">Sign Up</button>
      </div>

      <!-- LOGIN -->

      <form class="auth-form active" id="loginForm">
        <h2>Welcome Back</h2>

        <p>Login to continue learning</p>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-envelope"></i>

            Email
          </label>

          <input type="email" placeholder="Enter email" />
        </div>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-lock"></i>

            Password
          </label>

          <input type="password" placeholder="Enter password" />
        </div>

        <button class="auth-btn">Login</button>
      </form>

      <!-- SIGNUP -->

      <form class="auth-form" id="signupForm">
        <h2>Create Account</h2>

        <p>Join Alibros Learning</p>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-user"></i>

            Full Name
          </label>

          <input type="text" placeholder="Enter full name" />
        </div>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-envelope"></i>

            Email
          </label>

          <input type="email" placeholder="Enter email" />
        </div>

        <div class="input-box">
          <label>
            <i class="fa-solid fa-lock"></i>

            Password
          </label>

          <input type="password" placeholder="Create password" />
        </div>

        <button class="auth-btn">Sign Up</button>
      </form>
    </div>

    <!-- SCRIPT -->

    <script>
      const loginBtn = document.getElementById("loginBtn");

      const signupBtn = document.getElementById("signupBtn");

      const loginForm = document.getElementById("loginForm");

      const signupForm = document.getElementById("signupForm");

      /* LOGIN */

      loginBtn.onclick = () => {
        loginBtn.classList.add("active");

        signupBtn.classList.remove("active");

        loginForm.classList.add("active");

        signupForm.classList.remove("active");
      };

      /* SIGNUP */

      signupBtn.onclick = () => {
        signupBtn.classList.add("active");

        loginBtn.classList.remove("active");

        signupForm.classList.add("active");

        loginForm.classList.remove("active");
      };
    </script>
  </body>
</html>
